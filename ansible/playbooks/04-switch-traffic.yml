---
# Cuts traffic over to Green via the Nginx router. Run wrk2 across this command
# to capture the actual downtime/latency during the switch.
- name: Switch live traffic to Green
  hosts: local
  gather_facts: false
  tasks:
    - include_role:
        name: switch_traffic
      vars:
        target_env: "{{ switch_env | default('green') }}"

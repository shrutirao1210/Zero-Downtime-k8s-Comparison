---
# Deploys the nginx routing layer into the 'routing' namespace.
#
# Volume design (solves the read-only ConfigMap problem):
#   - ConfigMap is mounted at /etc/nginx/conf.d-init/ (read-only, for pod restarts)
#   - /etc/nginx/conf.d/ is an emptyDir (writable at runtime)
#   - An initContainer copies the initial config from conf.d-init → conf.d
#   - Live switches use: kubectl exec -- sh -c 'cat > /etc/nginx/conf.d/default.conf'
#     followed by nginx -s reload — no tar, no read-only filesystem issues.

- name: Default target_env to active_env on first run
  set_fact:
    target_env: "{{ target_env | default(active_env) }}"

- name: Render initial default.conf pointing at {{ target_env }}
  template:
    src: default.conf.j2
    dest: /tmp/nginx-router-initial.conf

- name: Create routing ConfigMap with initial default.conf
  shell: |
    kubectl create configmap {{ nginx_configmap }} \
      --from-file=default.conf=/tmp/nginx-router-initial.conf \
      -n {{ nginx_namespace }} \
      --dry-run=client -o yaml | kubectl apply -f -
  changed_when: true

- name: Deploy nginx router Deployment (writable emptyDir for live config)
  copy:
    dest: /tmp/nginx-router-deploy.yml
    content: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ nginx_deployment }}
        namespace: {{ nginx_namespace }}
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: {{ nginx_deployment }}
        template:
          metadata:
            labels:
              app: {{ nginx_deployment }}
          spec:
            initContainers:
              # Copies the ConfigMap config into the writable emptyDir on startup.
              # This ensures pod restarts pick up the latest ConfigMap config,
              # while still leaving /etc/nginx/conf.d writable for live switches.
              - name: init-conf
                image: busybox:1.36
                command:
                  - sh
                  - -c
                  - "cp /etc/nginx/conf.d-init/default.conf /etc/nginx/conf.d/default.conf"
                volumeMounts:
                  - name: conf-init
                    mountPath: /etc/nginx/conf.d-init
                    readOnly: true
                  - name: conf-live
                    mountPath: /etc/nginx/conf.d
            containers:
              - name: nginx
                image: nginx:1.27-alpine
                ports:
                  - containerPort: 80
                readinessProbe:
                  httpGet:
                    path: /__nginx_health
                    port: 80
                  initialDelaySeconds: 2
                  periodSeconds: 3
                  failureThreshold: 2
                livenessProbe:
                  httpGet:
                    path: /__nginx_health
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  requests:
                    cpu: "50m"
                    memory: "32Mi"
                  limits:
                    cpu: "200m"
                    memory: "64Mi"
                volumeMounts:
                  - name: conf-live
                    mountPath: /etc/nginx/conf.d
            volumes:
              - name: conf-init
                configMap:
                  name: {{ nginx_configmap }}
              - name: conf-live
                emptyDir: {}

- name: Apply nginx router Deployment
  command: kubectl apply -f /tmp/nginx-router-deploy.yml
  changed_when: true

- name: Deploy nginx router NodePort Service
  copy:
    dest: /tmp/nginx-router-svc.yml
    content: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ nginx_service }}
        namespace: {{ nginx_namespace }}
      spec:
        type: NodePort
        selector:
          app: {{ nginx_deployment }}
        ports:
          - port: 80
            targetPort: 80
            nodePort: {{ nginx_node_port }}

- name: Apply nginx router Service
  command: kubectl apply -f /tmp/nginx-router-svc.yml
  changed_when: true

- name: Rollout restart to apply new Deployment spec (emptyDir volumes)
  command: kubectl rollout restart deployment/{{ nginx_deployment }} -n {{ nginx_namespace }}
  changed_when: true

- name: Wait for nginx router rollout
  command: kubectl rollout status deployment/{{ nginx_deployment }} -n {{ nginx_namespace }} --timeout=120s
  changed_when: false
